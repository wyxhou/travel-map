<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Map · Aishu & Bagachi</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23f0e6d8'/%3E%3Ctext x='6' y='24' font-size='20'%3E🗺️%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Dancing+Script:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #100c08;
  --bg2:        #1a1208;
  --panel:      rgba(28, 21, 16, 0.92);
  --cream:      #fdf4e8;
  --parchment:  #ede0c8;
  --rosegold:   #d4a070;
  --rosegold-l: #ecc090;
  --rosegold-d: #b07848;
  --ink:        #faeedd;
  --ink-dim:    #c8a878;
  --ink-faint:  #907560;
  --memory:     #e08850;
  --dream:      #9080d8;
  --border:     rgba(200,149,106,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%; overflow:hidden;
  background: var(--bg);
  font-family: 'Lora', serif;
  color: var(--ink);
}

/* ── BACKGROUND ── */
.bg {
  position:fixed; inset:0; z-index:0;
  background: radial-gradient(ellipse 80% 80% at 50% 50%,
    #221a12 0%, #1a1208 60%, #100c06 100%);
}
.bg::after {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 60% 60% at 50% 50%,
    rgba(200,149,106,0.06) 0%, transparent 70%);
}

/* ── CORNER FLOURISHES ── */
.corner {
  position:fixed; z-index:2; pointer-events:none;
  width:100px; height:100px; opacity:0.18;
}
.corner svg { width:100%; height:100%; }
.corner.tl { top:12px; left:12px; }
.corner.tr { top:12px; right:12px; transform:scaleX(-1); }
.corner.bl { bottom:12px; left:12px; transform:scaleY(-1); }
.corner.br { bottom:12px; right:12px; transform:scale(-1); }

/* ── LAYOUT: side panel left, globe right ── */
.layout {
  position:fixed; inset:0; z-index:10;
  display:grid;
  grid-template-columns: 300px 1fr;
}

/* ── LEFT PANEL ── */
.side-panel {
  display:flex; flex-direction:column;
  padding:36px 28px 28px;
  border-right: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(18,12,8,0.99) 0%, rgba(14,9,5,0.99) 100%);
  overflow-y: auto; gap:28px;
  z-index:11;
}

.side-panel::-webkit-scrollbar { width:2px; }
.side-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.panel-title {
  font-family:'Cormorant Garamond', serif;
  font-style:italic; font-weight:300;
  font-size:2.1rem; line-height:1.1;
  color:var(--cream);
  letter-spacing:0.04em;
}
.panel-sub {
  font-size:0.62rem; letter-spacing:0.24em;
  color:var(--ink-faint); text-transform:uppercase;
  margin-top:6px;
}
.panel-divider {
  width:40px; height:1px;
  background:linear-gradient(to right, var(--rosegold), transparent);
  margin-top:14px;
}

/* Count stats */
.stats {
  display:flex; flex-direction:column; gap:12px;
}
.stat-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px;
  background:rgba(200,149,106,0.1);
  border:1px solid rgba(200,149,106,0.25);
  border-radius:6px;
}
.stat-label {
  display:flex; align-items:center; gap:8px;
  font-size:0.7rem; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--ink-dim);
}
.stat-dot {
  width:8px; height:8px; border-radius:50%;
  flex-shrink:0;
}
.stat-dot.all    { background:var(--rosegold); }
.stat-dot.memory { background:var(--memory); }
.stat-dot.dream  { background:var(--dream); }
.stat-num {
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem; font-weight:400; line-height:1;
  color:var(--cream);
}

/* Place list */
.place-list-label {
  font-size:0.58rem; letter-spacing:0.22em;
  text-transform:uppercase; color:var(--ink-faint);
  margin-bottom:8px;
}
.place-list { display:flex; flex-direction:column; gap:5px; }

.place-row {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:6px; cursor:pointer;
  border:1px solid transparent;
  transition:background 0.18s, border-color 0.18s;
}
.place-row:hover {
  background:rgba(200,149,106,0.1);
  border-color:var(--border);
}
.place-row.active {
  background:rgba(200,149,106,0.14);
  border-color:rgba(200,149,106,0.35);
}
.place-row-dot {
  width:7px; height:7px; border-radius:50%; flex-shrink:0;
}
.place-row-dot.memory { background:var(--memory); box-shadow:0 0 5px rgba(212,132,90,0.5); }
.place-row-dot.dream  { background:var(--dream);  box-shadow:0 0 5px rgba(136,120,200,0.5); }
.place-row-name {
  font-size:0.8rem; color:#fdf4e8; flex:1; font-weight:500;
}
.place-row-type {
  font-size:0.58rem; color:var(--ink-faint);
  font-style:italic;
}

/* Hint */
.drag-hint {
  font-size:0.6rem; letter-spacing:0.18em;
  color:var(--ink-faint); text-transform:uppercase;
  text-align:center; margin-top:auto; padding-top:16px;
  animation:hintFade 3s ease-in-out infinite;
}
@keyframes hintFade { 0%,100%{opacity:0.3;} 50%{opacity:0.7;} }

/* ── GLOBE AREA ── */
.globe-area {
  position:relative;
  display:flex; align-items:center; justify-content:center;
  cursor:grab; overflow:hidden;
  padding: 72px 24px 72px 24px; /* top/bottom clearance for any floating UI */
}
.globe-area.dragging { cursor:grabbing; }

canvas#globe {
  border-radius:50%;
  box-shadow:
    0 0 0 1px rgba(200,149,106,0.25),
    0 0 80px 30px rgba(200,120,70,0.1),
    0 30px 100px rgba(0,0,0,0.6);
}

/* ── PIN CARD (floating over globe) ── */
.pin-card {
  position:absolute; z-index:50;
  width:240px;
  background: #160f09;
  border:1px solid rgba(200,149,106,0.35);
  border-radius:10px; overflow:hidden;
  box-shadow: 0 12px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
  opacity:0; pointer-events:none;
  transform:translateY(10px) scale(0.95);
  transition:opacity 0.22s ease, transform 0.22s ease;
}
.pin-card.visible {
  opacity:1; pointer-events:all;
  transform:translateY(0) scale(1);
}

.pin-card-img {
  width:100%; height:120px; object-fit:cover; display:block;
}
.pin-card-img-placeholder {
  width:100%; height:110px;
  background:linear-gradient(135deg, #2a1e14 0%, #1e1510 100%);
  display:flex; align-items:center; justify-content:center;
  font-size:2.8rem;
  border-bottom:1px solid var(--border);
}

.pin-card-body { padding:14px 16px 16px; }

.pin-card-type {
  font-size:0.52rem; letter-spacing:0.24em; text-transform:uppercase;
  margin-bottom:6px;
}
.pin-card-type.memory { color:var(--memory); }
.pin-card-type.dream  { color:var(--dream); }

.pin-card-name {
  font-family:'Cormorant Garamond',serif;
  font-size:1.3rem; font-weight:600; color:var(--cream);
  margin-bottom:8px; line-height:1.2;
}
.pin-card-divider {
  width:28px; height:1px;
  background:linear-gradient(to right, var(--rosegold), transparent);
  margin-bottom:10px;
}
.pin-card-date {
  font-size:0.62rem; color:#988060;
  letter-spacing:0.06em; margin-bottom:7px; font-style:italic;
}
.pin-card-note {
  font-style:italic; font-size:0.76rem;
  line-height:1.65; color:#c8a878;
}
.pin-card-close {
  position:absolute; top:8px; right:8px;
  background:rgba(0,0,0,0.5); border:1px solid var(--border);
  cursor:pointer; width:22px; height:22px; border-radius:50%;
  font-size:0.65rem; color:var(--ink-dim);
  display:flex; align-items:center; justify-content:center;
  transition:background 0.18s;
}
.pin-card-close:hover { background:rgba(200,149,106,0.2); color:var(--cream); }
</style>
</head>
<body>

<div class="bg"></div>

<!-- Corner flourishes -->
<div class="corner tl"><svg viewBox="0 0 100 100" fill="none"><path d="M10 90 Q10 10 90 10" stroke="#c49a7a" stroke-width="1.2" fill="none"/><path d="M10 90 Q10 30 70 10" stroke="#c49a7a" stroke-width="0.5" fill="none" opacity="0.5"/><circle cx="10" cy="90" r="3" fill="#c49a7a" opacity="0.6"/><circle cx="90" cy="10" r="2" fill="#c49a7a" opacity="0.5"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 100 100" fill="none"><path d="M10 90 Q10 10 90 10" stroke="#c49a7a" stroke-width="1.2" fill="none"/><path d="M10 90 Q10 30 70 10" stroke="#c49a7a" stroke-width="0.5" fill="none" opacity="0.5"/><circle cx="10" cy="90" r="3" fill="#c49a7a" opacity="0.6"/><circle cx="90" cy="10" r="2" fill="#c49a7a" opacity="0.5"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 100 100" fill="none"><path d="M10 90 Q10 10 90 10" stroke="#c49a7a" stroke-width="1.2" fill="none"/><path d="M10 90 Q10 30 70 10" stroke="#c49a7a" stroke-width="0.5" fill="none" opacity="0.5"/><circle cx="10" cy="90" r="3" fill="#c49a7a" opacity="0.6"/><circle cx="90" cy="10" r="2" fill="#c49a7a" opacity="0.5"/></svg></div>
<div class="corner br"><svg viewBox="0 0 100 100" fill="none"><path d="M10 90 Q10 10 90 10" stroke="#c49a7a" stroke-width="1.2" fill="none"/><path d="M10 90 Q10 30 70 10" stroke="#c49a7a" stroke-width="0.5" fill="none" opacity="0.5"/><circle cx="10" cy="90" r="3" fill="#c49a7a" opacity="0.6"/><circle cx="90" cy="10" r="2" fill="#c49a7a" opacity="0.5"/></svg></div>

<div class="layout">

  <!-- LEFT SIDE PANEL -->
  <div class="side-panel">
    <div>
      <div class="panel-title">our map</div>
      <div class="panel-sub">the places that are ours</div>
      <div class="panel-divider"></div>

<script>
// ── PLACES DATA ─────────────────────────────────────────────────────────────
// lat/lng in degrees, type: "memory" | "dream"
// photo: url string or null (shows emoji placeholder)
// Add your own places here!
const PLACES = [
  {
    name: "Bangalore",
    lat: 12.97, lng: 77.59,
    type: "memory",
    emoji: "🌆",
    date: "where it all began",
    note: "the city that decided we were each other's. home.",
    photo: null,
  },
  {
    name: "Kyoto",
    lat: 35.01, lng: 135.76,
    type: "dream",
    emoji: "⛩️",
    date: "someday",
    note: "cherry blossoms and quiet temples. i want to walk through all of it with you.",
    photo: null,
  },
  {
    name: "Santorini",
    lat: 36.39, lng: 25.46,
    type: "dream",
    emoji: "🏛️",
    date: "one day",
    note: "white walls and the bluest water you've ever seen. we'd watch the sun set over the caldera.",
    photo: null,
  },
  {
    name: "Paris",
    lat: 48.85, lng: 2.35,
    type: "dream",
    emoji: "🗼",
    date: "on our list",
    note: "because every city is better with you in it, but paris especially.",
    photo: null,
  },
  {
    name: "Coorg",
    lat: 12.42, lng: 75.74,
    type: "dream",
    emoji: "☕",
    date: "soon",
    note: "misty hills and coffee plantations. a weekend just for us.",
    photo: null,
  },
  {
    name: "New Zealand",
    lat: -43.53, lng: 172.63,
    type: "dream",
    emoji: "🏔️",
    date: "big dream",
    note: "the kind of landscape that makes you feel small in the best way. i want to feel that with you.",
    photo: null,
  },
  {
    name: "Goa",
    lat: 15.49, lng: 73.82,
    type: "dream",
    emoji: "🌊",
    date: "soon",
    note: "golden hour on the beach, cold drinks, nowhere to be.",
    photo: null,
  },
];

// ── GLOBE SETUP ─────────────────────────────────────────────────────────────
const canvas    = document.getElementById('globe');
const ctx       = canvas.getContext('2d');
const globeArea = document.getElementById('globeArea');

let R, cx, cy; // globe radius and center

function resize() {
  const area = globeArea.getBoundingClientRect();
  // Subtract padding (144px top+bottom, 48px left+right) so globe never touches edges
  const size = Math.min((area.width - 48) * 0.92, (area.height - 144) * 0.92, 560);
  canvas.width  = size;
  canvas.height = size;
  R  = size / 2 - 2;
  cx = size / 2;
  cy = size / 2;
}

// Rotation state (euler angles in radians)
let rotX = 0.3,  // tilt (latitude offset)
    rotY = 1.2;  // spin (longitude offset)

// ── LAND DATA — simplified GeoJSON polygons ─────────────────────────────────
// We'll fetch a lightweight topojson from a CDN and render it
let landFeatures = null;
let projCache = [];

// Convert lat/lng to 3D unit vector
function latLngTo3D(lat, lng) {
  const phi   = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return {
    x:  Math.sin(phi) * Math.cos(theta),
    y:  Math.cos(phi),
    z:  Math.sin(phi) * Math.sin(theta),
  };
}

// Rotate a 3D point by rotY (around Y axis) then rotX (around X axis)
function rotate3D(p) {
  // rotate around Y
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  let x1 =  p.x * cosY + p.z * sinY;
  let y1 =  p.y;
  let z1 = -p.x * sinY + p.z * cosY;
  // rotate around X
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  let x2 = x1;
  let y2 = y1 * cosX - z1 * sinX;
  let z2 = y1 * sinX + z1 * cosX;
  return { x: x2, y: y2, z: z2 };
}

// Project 3D point to 2D canvas
function project(p) {
  return {
    x: cx + p.x * R,
    y: cy - p.y * R,
    visible: p.z > 0,
  };
}

// ── DRAW ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ── Globe base
  // Ocean base — deep blue
  const oceanGrad = ctx.createRadialGradient(cx - R*0.3, cy - R*0.3, R*0.1, cx, cy, R);
  oceanGrad.addColorStop(0,   '#1e4060');
  oceanGrad.addColorStop(0.5, '#152d48');
  oceanGrad.addColorStop(1,   '#0c1a28');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = oceanGrad;
  ctx.fill();

  // ── Latitude / longitude grid lines
  drawGrid();

  // ── Land
  if (landFeatures) drawLand();

  // ── Atmosphere rim
  const rim = ctx.createRadialGradient(cx, cy, R * 0.88, cx, cy, R);
  rim.addColorStop(0, 'transparent');
  rim.addColorStop(1, 'rgba(196,154,122,0.22)');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = rim;
  ctx.fill();

  // ── Sheen highlight
  const sheen = ctx.createRadialGradient(cx - R*0.3, cy - R*0.35, 0, cx - R*0.1, cy - R*0.1, R*0.7);
  sheen.addColorStop(0, 'rgba(255,252,248,0.38)');
  sheen.addColorStop(0.5, 'rgba(255,252,248,0.05)');
  sheen.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = sheen;
  ctx.fill();

  // ── Clip future drawing to globe
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R - 1, 0, Math.PI * 2);
  ctx.clip();

  // ── Pins
  drawPins();

  ctx.restore();
}

function drawGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(100,150,200,0.22)';
  ctx.lineWidth = 0.6;

  // Latitude lines every 30°
  for (let lat = -60; lat <= 60; lat += 30) {
    ctx.beginPath();
    let first = true;
    for (let lng = -180; lng <= 180; lng += 3) {
      const p3 = latLngTo3D(lat, lng);
      const r  = rotate3D(p3);
      const p2 = project(r);
      if (!p2.visible) { first = true; continue; }
      if (first) { ctx.moveTo(p2.x, p2.y); first = false; }
      else ctx.lineTo(p2.x, p2.y);
    }
    ctx.stroke();
  }

  // Longitude lines every 30°
  for (let lng = -180; lng < 180; lng += 30) {
    ctx.beginPath();
    let first = true;
    for (let lat = -90; lat <= 90; lat += 3) {
      const p3 = latLngTo3D(lat, lng);
      const r  = rotate3D(p3);
      const p2 = project(r);
      if (!p2.visible) { first = true; continue; }
      if (first) { ctx.moveTo(p2.x, p2.y); first = false; }
      else ctx.lineTo(p2.x, p2.y);
    }
    ctx.stroke();
  }
  ctx.restore();
}

function drawLand() {
  ctx.save();
  landFeatures.forEach(feature => {
    const geom = feature.geometry;
    const polys = geom.type === 'Polygon'
      ? [geom.coordinates]
      : geom.coordinates;

    polys.forEach(poly => {
      poly.forEach(ring => {
        ctx.beginPath();
        let first = true, hadVisible = false;
        ring.forEach(([lng, lat]) => {
          const p3 = latLngTo3D(lat, lng);
          const r  = rotate3D(p3);
          const p2 = project(r);
          if (!p2.visible) { first = true; return; }
          hadVisible = true;
          if (first) { ctx.moveTo(p2.x, p2.y); first = false; }
          else ctx.lineTo(p2.x, p2.y);
        });
        if (hadVisible) {
          ctx.fillStyle   = 'rgba(205,168,118,0.95)';
          ctx.strokeStyle = 'rgba(235,200,150,0.7)';
          ctx.lineWidth   = 0.4;
          ctx.fill();
          ctx.stroke();
        }
      });
    });
  });
  ctx.restore();
}

// Precomputed pin screen positions (updated each frame)
let pinScreenPositions = [];

function drawPins() {
  pinScreenPositions = [];

  // Sort by z (depth) so front pins draw on top
  const sorted = PLACES.map((place, idx) => {
    const p3 = latLngTo3D(place.lat, place.lng);
    const r  = rotate3D(p3);
    return { place, idx, r };
  }).sort((a, b) => a.r.z - b.r.z);

  sorted.forEach(({ place, idx, r }) => {
    const p2 = project(r);
    const visible = r.z > -0.1;
    const fade    = Math.max(0, Math.min(1, (r.z + 0.15) / 0.3));

    pinScreenPositions[idx] = { x: p2.x, y: p2.y, visible, z: r.z };

    if (!visible) return;

    const isMemory = place.type === 'memory';
    const col      = isMemory ? '#e08850' : '#9080d8';
    const colLight = isMemory ? '#e0b898' : '#c0b4e0';

    // Pin glow
    const glow = ctx.createRadialGradient(p2.x, p2.y, 0, p2.x, p2.y, 22);
    glow.addColorStop(0, isMemory ? 'rgba(220,136,80,0.55)' : 'rgba(144,128,216,0.55)');
    glow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(p2.x, p2.y, 22, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.globalAlpha = fade;
    ctx.fill();

    // Outer ring
    ctx.beginPath();
    ctx.arc(p2.x, p2.y, 8, 0, Math.PI * 2);
    ctx.fillStyle   = 'rgba(255,252,245,1)';
    ctx.strokeStyle = col;
    ctx.lineWidth   = 2.2;
    ctx.globalAlpha = fade;
    ctx.fill();
    ctx.stroke();

    // Inner dot
    ctx.beginPath();
    ctx.arc(p2.x, p2.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.globalAlpha = fade;
    ctx.fill();

    ctx.globalAlpha = 1;
  });
}

// ── LOAD LAND DATA ──────────────────────────────────────────────────────────
// Using a simple CDN-hosted world GeoJSON (Natural Earth 110m)
async function loadLand() {
  try {
    const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const topo = await resp.json();
    // Convert topojson to geojson manually (lightweight)
    const land = topoToGeo(topo, topo.objects.countries);
    landFeatures = land.features;
  } catch(e) {
    console.warn('Could not load land data', e);
    landFeatures = [];
  }
}

// Minimal topojson → geojson converter
function topoToGeo(topo, obj) {
  const arcs = topo.arcs;
  const scale = topo.transform?.scale || [1,1];
  const translate = topo.transform?.translate || [0,0];

  // Decode arc
  function decodeArc(arc) {
    let x=0, y=0;
    return arc.map(([dx,dy]) => {
      x += dx; y += dy;
      return [x * scale[0] + translate[0], y * scale[1] + translate[1]];
    });
  }

  function getArc(i) {
    if (i < 0) return decodeArc(arcs[~i]).reverse();
    return decodeArc(arcs[i]);
  }

  function getRing(indices) {
    return indices.flatMap(i => getArc(i));
  }

  function geomToFeature(geom) {
    if (geom.type === 'Polygon') {
      return {
        type:'Feature',
        geometry:{
          type:'Polygon',
          coordinates: geom.arcs.map(getRing)
        }
      };
    } else if (geom.type === 'MultiPolygon') {
      return {
        type:'Feature',
        geometry:{
          type:'MultiPolygon',
          coordinates: geom.arcs.map(p => p.map(getRing))
        }
      };
    }
    return null;
  }

  const features = obj.geometries.map(geomToFeature).filter(Boolean);
  return { type:'FeatureCollection', features };
}

// ── ANIMATION LOOP ──────────────────────────────────────────────────────────
let autoSpin = true;
let spinning = false; // user is dragging

function loop() {
  if (autoSpin && !spinning && !activeCard) {
    rotY += 0.0015;
  }
  draw();
  requestAnimationFrame(loop);
}

// ── DRAG ROTATION ────────────────────────────────────────────────────────────
let lastX, lastY;
let activeCard = null;

canvas.addEventListener('mousedown', e => {
  spinning = true;
  autoSpin = false;
  lastX = e.clientX; lastY = e.clientY;
  globeArea.classList.add('dragging');
  hideCard();
});

window.addEventListener('mousemove', e => {
  if (!spinning) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  rotY += dx * 0.005;
  rotX += dy * 0.005;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  lastX = e.clientX; lastY = e.clientY;
});

window.addEventListener('mouseup', () => {
  spinning = false;
  globeArea.classList.remove('dragging');
  // Resume auto-spin after 4s idle
  setTimeout(() => { autoSpin = true; }, 4000);
});

// Touch support
canvas.addEventListener('touchstart', e => {
  spinning = true; autoSpin = false;
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  hideCard();
}, { passive: true });

window.addEventListener('touchmove', e => {
  if (!spinning) return;
  const dx = e.touches[0].clientX - lastX;
  const dy = e.touches[0].clientY - lastY;
  rotY += dx * 0.005;
  rotX += dy * 0.005;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
}, { passive: true });

window.addEventListener('touchend', () => {
  spinning = false;
  setTimeout(() => { autoSpin = true; }, 4000);
});

// ── PIN CLICK ────────────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  if (hasDragged) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Find closest visible pin within 16px
  let best = null, bestDist = 16;
  pinScreenPositions.forEach((pos, idx) => {
    if (!pos.visible || pos.z < 0) return;
    const dist = Math.hypot(mx - pos.x, my - pos.y);
    if (dist < bestDist) { bestDist = dist; best = idx; }
  });

  if (best !== null) {
    showCard(best, e.clientX, e.clientY);
  } else {
    hideCard();
  }
});

// Track drag vs click
let hasDragged = false;
canvas.addEventListener('mousedown', () => { hasDragged = false; });
window.addEventListener('mousemove', () => { if (spinning) hasDragged = true; });

// ── PIN CARD ──────────────────────────────────────────────────────────────────
const card     = document.getElementById('pinCard');
const pinClose = document.getElementById('pinClose');

function showCard(idx, screenX, screenY) {
  const place = PLACES[idx];
  activeCard = idx;

  // Type label
  const typeEl = document.getElementById('pinType');
  typeEl.textContent = place.type === 'memory' ? '✦ a memory' : '✦ a dream';
  typeEl.className = 'pin-card-type ' + place.type;

  document.getElementById('pinName').textContent = place.name;
  document.getElementById('pinDate').textContent = place.date;
  document.getElementById('pinNote').textContent = place.note;

  // Image or emoji placeholder
  const imgWrap = document.getElementById('pinImgWrap');
  if (place.photo) {
    imgWrap.innerHTML = `<img class="pin-card-img" src="${place.photo}" alt="${place.name}">`;
  } else {
    imgWrap.innerHTML = `<div class="pin-card-img-placeholder">${place.emoji}</div>`;
  }

  // Position card relative to globeArea
  const area = globeArea.getBoundingClientRect();
  const cardW = 240, cardH = 320;
  // canvasX/Y relative to globeArea
  const pos = pinScreenPositions[idx];
  const canvasRect = canvas.getBoundingClientRect();
  const pinAreaX = canvasRect.left - area.left + pos.x;
  const pinAreaY = canvasRect.top  - area.top  + pos.y;

  let left = pinAreaX + 20;
  let top  = pinAreaY - cardH / 2;
  if (left + cardW > area.width  - 12) left = pinAreaX - cardW - 20;
  if (top  < 12) top = 12;
  if (top  + cardH > area.height - 12) top = area.height - cardH - 12;
  left = Math.max(8, left);

  card.style.left = left + 'px';
  card.style.top  = top  + 'px';
  card.classList.add('visible');
}

function hideCard() {
  card.classList.remove('visible');
  activeCard = null;
}

pinClose.addEventListener('click', hideCard);

// ── COUNTS ────────────────────────────────────────────────────────────────────
document.getElementById('countTotal').textContent  = PLACES.length;
document.getElementById('countMemory').textContent = PLACES.filter(p => p.type==='memory').length;
document.getElementById('countDream').textContent  = PLACES.filter(p => p.type==='dream').length;

// ── PLACE LIST ─────────────────────────────────────────────────────────────────
const placeList = document.getElementById('placeList');
PLACES.forEach((place, idx) => {
  const row = document.createElement('div');
  row.className = 'place-row';
  row.id = 'place-row-' + idx;
  row.innerHTML = `
    <div class="place-row-dot ${place.type}"></div>
    <div class="place-row-name">${place.name}</div>
    <div class="place-row-type">${place.type === 'memory' ? 'memory' : 'dream'}</div>
  `;
  row.addEventListener('click', () => {
    // Spin globe to face this place, then show card
    const p3 = latLngTo3D(place.lat, place.lng);
    // Target rotation: make this point face front (z=1)
    // lng offset: rotY = -(lng * pi/180) + pi
    const targetRotY = -(place.lng * Math.PI / 180) + Math.PI;
    const targetRotX = -(place.lat * Math.PI / 180);
    // Animate spin
    autoSpin = false;
    const startY = rotY, startX = rotX;
    let dY = targetRotY - startY;
    // Take shortest path
    while (dY > Math.PI)  dY -= 2 * Math.PI;
    while (dY < -Math.PI) dY += 2 * Math.PI;
    const dX = Math.max(-Math.PI/2, Math.min(Math.PI/2, targetRotX)) - startX;
    const dur = 900, t0 = performance.now();
    function animSpin(t) {
      const prog = Math.min(1, (t - t0) / dur);
      const ease = 1 - Math.pow(1 - prog, 3);
      rotY = startY + dY * ease;
      rotX = startX + dX * ease;
      if (prog < 1) { requestAnimationFrame(animSpin); }
      else {
        // Show card at pin position
        const pos = pinScreenPositions[idx];
        if (pos && pos.visible) {
          const canvasRect = canvas.getBoundingClientRect();
          showCard(idx, canvasRect.left + pos.x, canvasRect.top + pos.y);
        }
        setTimeout(() => { autoSpin = true; }, 5000);
      }
    }
    requestAnimationFrame(animSpin);
    // Highlight row
    document.querySelectorAll('.place-row').forEach(r => r.classList.remove('active'));
    row.classList.add('active');
  });
  placeList.appendChild(row);
});

// ── INIT ──────────────────────────────────────────────────────────────────────
resize();
loop();
loadLand();
window.addEventListener('resize', () => { resize(); });
</script>
